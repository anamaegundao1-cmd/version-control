<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Menu</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #fff3e08a;
    }

    .card img {
      height: 200px;
      object-fit: cover;
    }

    .price {
      font-weight: bold;
      color: green;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
<nav class="navbar navbar-dark bg-danger">
  <div class="container">
    <span class="navbar-brand mb-0 h1">🍔 My Food Menu</span>
  </div>
</nav>

<!-- Menu Section -->
<div class="container mt-4">
  <div class="row g-4">

    <!-- Burger -->
    <div class="col-md-3">
      <div class="card">
        <img src="https://cdn.pixabay.com/photo/2016/03/05/19/02/hamburger-1238246_960_720.jpg" class="card-img-top">
        <div class="card-body text-center">
          <h5 class="card-title">Burger</h5>
          <p class="card-text">Juicy beef burger with cheese</p>
          <p class="price">₱120</p>
        </div>
      </div>
    </div>

    <!-- Pizza -->
    <div class="col-md-3">
      <div class="card">
        <img src="https://cdn.pixabay.com/photo/2017/12/09/08/18/pizza-3007395_960_720.jpg" class="card-img-top">
        <div class="card-body text-center">
          <h5 class="card-title">Pizza</h5>
          <p class="card-text">Cheesy pizza with toppings</p>
          <p class="price">₱250</p>
        </div>
      </div>
    </div>

    <!-- Fries -->
    <div class="col-md-3">
      <div class="card">
        <img src="https://cdn.pixabay.com/photo/2016/03/05/19/02/fries-1238245_960_720.jpg" class="card-img-top">
        <div class="card-body text-center">
          <h5 class="card-title">Fries</h5>
          <p class="card-text">Crispy golden fries</p>
          <p class="price">₱80</p>
        </div>
      </div>
    </div>

    <!-- Drink -->
    <div class="col-md-3">
      <div class="card">
        <img src="https://encyclopedia.che.engin.umich.edu/wp-content/uploads/sites/564/2022/04/soft-drinks.png">
        <div class="card-body text-center">
          <h5 class="card-title">Soft Drink</h5>
          <p class="card-text">Cold refreshing drink</p>
          <p class="price">₱50</p>
        </div>
      </div>
    </div>

  </div>
</div>


<!-- Footer -->
<footer class="bg-danger text-white text-center p-3 mt-4">
  🍽️ Enjoy your meal!
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
